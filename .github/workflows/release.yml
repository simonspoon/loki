name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            name: loki-darwin-amd64
          - target: aarch64-apple-darwin
            name: loki-darwin-arm64

    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/loki ${{ matrix.name }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
          generate_release_notes: true

  update-tap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/simonspoon/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[tool]=loki" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[repo]=simonspoon/loki"
