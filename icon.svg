<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#0d1117"/>

  <!-- Corner accents — angular trickster mask -->
  <rect x="4" y="1" width="2" height="1" fill="#14532d"/>
  <rect x="10" y="1" width="2" height="1" fill="#14532d"/>
  <rect x="4" y="14" width="2" height="1" fill="#14532d"/>
  <rect x="10" y="14" width="2" height="1" fill="#14532d"/>

  <!-- Eye outline — dark -->
  <rect x="6" y="2" width="4" height="1" fill="#14532d"/>
  <rect x="4" y="3" width="8" height="1" fill="#14532d"/>
  <rect x="3" y="4" width="10" height="1" fill="#14532d"/>
  <rect x="2" y="5" width="12" height="1" fill="#14532d"/>
  <rect x="1" y="6" width="14" height="1" fill="#14532d"/>
  <rect x="0" y="7" width="16" height="2" fill="#14532d"/>
  <rect x="1" y="9" width="14" height="1" fill="#14532d"/>
  <rect x="2" y="10" width="12" height="1" fill="#14532d"/>
  <rect x="3" y="11" width="10" height="1" fill="#14532d"/>
  <rect x="4" y="12" width="8" height="1" fill="#14532d"/>
  <rect x="6" y="13" width="4" height="1" fill="#14532d"/>

  <!-- Eye fill — main green -->
  <rect x="6" y="3" width="4" height="1" fill="#22c55e"/>
  <rect x="4" y="4" width="8" height="1" fill="#22c55e"/>
  <rect x="3" y="5" width="10" height="1" fill="#22c55e"/>
  <rect x="2" y="6" width="12" height="1" fill="#22c55e"/>
  <rect x="1" y="7" width="14" height="2" fill="#22c55e"/>
  <rect x="2" y="9" width="12" height="1" fill="#22c55e"/>
  <rect x="3" y="10" width="10" height="1" fill="#22c55e"/>
  <rect x="4" y="11" width="8" height="1" fill="#22c55e"/>
  <rect x="6" y="12" width="4" height="1" fill="#22c55e"/>

  <!-- Upper highlight — light -->
  <rect x="6" y="3" width="2" height="1" fill="#4ade80"/>
  <rect x="4" y="4" width="4" height="1" fill="#4ade80"/>
  <rect x="3" y="5" width="5" height="1" fill="#4ade80"/>
  <rect x="2" y="6" width="5" height="1" fill="#4ade80"/>

  <!-- Iris — dark ring -->
  <rect x="6" y="5" width="4" height="1" fill="#14532d"/>
  <rect x="5" y="6" width="6" height="1" fill="#14532d"/>
  <rect x="4" y="7" width="8" height="2" fill="#14532d"/>
  <rect x="5" y="9" width="6" height="1" fill="#14532d"/>
  <rect x="6" y="10" width="4" height="1" fill="#14532d"/>

  <!-- Vertical pupil slit — trickster eye -->
  <rect x="7" y="5" width="2" height="6" fill="#86efac"/>
  <rect x="7" y="7" width="2" height="2" fill="#dcfce7"/>
</svg>
